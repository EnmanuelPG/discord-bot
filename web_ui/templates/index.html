<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat IA - Ollama</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #1a1a2e; color: #eee; height: 100vh; display: flex; flex-direction: column; }
  header { background: #16213e; padding: 16px 24px; border-bottom: 1px solid #0f3460; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 18px; color: #e94560; }
  header span { font-size: 13px; color: #888; }
  #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
  .user { background: #0f3460; align-self: flex-end; border-bottom-right-radius: 4px; }
  .bot { background: #16213e; align-self: flex-start; border-bottom-left-radius: 4px; }
  .bot.loading { opacity: 0.6; }
  #input-area { display: flex; gap: 8px; padding: 16px 20px; background: #16213e; border-top: 1px solid #0f3460; }
  #input { flex: 1; padding: 12px 16px; border-radius: 8px; border: 1px solid #0f3460; background: #1a1a2e; color: #eee; font-size: 14px; outline: none; }
  #input:focus { border-color: #e94560; }
  #send { padding: 12px 24px; border-radius: 8px; border: none; background: #e94560; color: white; font-size: 14px; cursor: pointer; }
  #send:hover { background: #d63851; }
  #send:disabled { opacity: 0.5; cursor: not-allowed; }
  #reset-btn { padding: 8px 16px; border-radius: 8px; border: 1px solid #555; background: transparent; color: #aaa; cursor: pointer; font-size: 12px; }
  #reset-btn:hover { color: #eee; border-color: #888; }
  .error { color: #e94560; padding: 8px; text-align: center; }
  @media (max-width: 600px) { .msg { max-width: 95%; } }
</style>
</head>
<body>
<header>
  <div><h1>Chat IA</h1><span id="model-name">Cargando...</span></div>
  <button id="reset-btn" onclick="resetChat()">Reset</button>
</header>
<div id="chat"></div>
<div id="input-area">
  <input id="input" type="text" placeholder="Escribe tu mensaje..." autofocus>
  <button id="send" onclick="sendMessage()">Enviar</button>
</div>
<script>
const chatEl = document.getElementById('chat');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send');

inputEl.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });

async function sendMessage() {
  const msg = inputEl.value.trim();
  if (!msg || sendBtn.disabled) return;
  inputEl.value = '';
  addMessage(msg, 'user');
  sendBtn.disabled = true;
  const loadingId = addMessage('...', 'bot loading');
  try {
    const res = await fetch('/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg })
    });
    const data = await res.json();
    document.getElementById(loadingId).remove();
    if (data.error) {
      addMessage('Error: ' + data.error, 'error');
    } else {
      addMessage(data.response, 'bot');
    }
  } catch (e) {
    document.getElementById(loadingId).remove();
    addMessage('Error de conexión', 'error');
  }
  sendBtn.disabled = false;
  inputEl.focus();
}

function addMessage(text, className) {
  const el = document.createElement('div');
  el.className = 'msg ' + className;
  el.textContent = text;
  const id = 'msg-' + Date.now() + '-' + Math.random().toString(36).slice(2);
  el.id = id;
  chatEl.appendChild(el);
  chatEl.scrollTop = chatEl.scrollHeight;
  return id;
}

async function resetChat() {
  await fetch('/reset', { method: 'POST' });
  chatEl.innerHTML = '';
  inputEl.focus();
}

fetch('/model').then(r => r.json()).then(d => {
  document.getElementById('model-name').textContent = 'Modelo: ' + d.model;
});
</script>
</body>
</html>
